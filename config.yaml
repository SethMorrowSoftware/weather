# ===========================================================================
# Precipitation -> MQTT controller configuration
# Data source: National Weather Service (api.weather.gov) -- US only, no key.
#
# Purpose: watch rainfall and tell irrigation PLCs when NOT to water.
# ===========================================================================

# Config schema version. Leave at 1; a future "Conditions -> Actions" schema
# (see ROADMAP.md) will introduce version 2 with an automatic migration.
version: 1

# --- Your facility's location ----------------------------------------------
# Decimal degrees. REPLACE THESE with your actual coordinates.
location:
  latitude: 41.2459      # <-- set to your facility
  longitude: -74.2735    # <-- set to your facility
  # Optional: pin a specific NWS observation station (4-letter id, e.g. "KMGJ").
  # Leave unset to auto-pick the nearest one. The monitor already falls back to
  # nearby stations for rainfall when the nearest lacks a working gauge (see
  # precipitation.station_fallback), so pin this only to force a preferred site.
  # Find candidates at:  https://api.weather.gov/points/<lat>,<lon>/stations
  # station_id: "KMGJ"

# NWS requires a User-Agent that identifies your app + a real contact, so they
# can reach you if your polling misbehaves. Put a working email or phone here.
user_agent: "facility-irrigation-controller (ops@example.com)"

# How often to poll the weather and re-evaluate rules.
poll_interval_minutes: 15

# false (default): publish only when a rule's state changes.
# true:            re-publish every rule's current state every cycle (heartbeat).
# Set true if your broker may restart and you depend on retained values.
always_publish: false

# Event-driven re-evaluation (default true): re-run the rules the instant an
# mqtt_in sensor message changes a value, instead of waiting for the next poll.
# The slow NWS weather fetch still runs on poll_interval_minutes; only rule
# evaluation is woken (debounced). Set false for strict poll-cadence behavior.
event_driven: true

# --- Operator variables (optional) -----------------------------------------
# Virtual flags/setpoints you can toggle from the dashboard (when manual control
# is enabled). Each becomes a metric named var_<name> that rules can reference,
# e.g. var_maintenance_mode. Types: bool or number. Runtime values persist in
# variables.json. Uncomment to use:
# variables:
#   maintenance_mode: { type: bool, default: false }
#   temp_setpoint:    { type: number, default: 70 }

# --- MQTT sensor inputs (optional) -----------------------------------------
# Subscribe to other devices' topics on the same broker and expose each payload
# as a rule metric. parse: number | bool | string. Uncomment to use:
# mqtt_inputs:
#   - { topic: "sensors/tank/level", metric: tank_level, parse: number }
#   - { topic: "sensors/door/open",  metric: door_open,  parse: bool }

# --- HTTP JSON inputs (optional) -------------------------------------------
# Poll a JSON endpoint and map fields (dotted path; arrays by index) to metrics.
# type: number | bool | string. Uncomment to use:
# http_inputs:
#   - url: "https://meter.local/api"
#     interval_minutes: 5
#     map:
#       - { metric: power_kw, path: "current_kw",    type: number }
#       - { metric: grid_up,  path: "status.online", type: bool }

# --- Precipitation settings ------------------------------------------------
precipitation:
  # Rolling window (hours) used to total measured rainfall into the
  # `precip_accum_in` metric. The irrigation rule below compares against it.
  lookback_hours: 24
  # Some ASOS/AWOS sites report present weather (RA) but no precip accumulation
  # -- their gauge is dead or absent, so they read a bogus 0.0 during rain. With
  # fallback on, the monitor walks to the next-nearest stations until one has a
  # gauge that actually covers the window, instead of trusting that 0.0.
  station_fallback: true
  max_fallback_stations: 5   # how many nearest-first stations to try (1-10)

# --- Web interface ---------------------------------------------------------
# Optional dashboard + config editor (webui.py). Reachable at http://host:port.
web:
  enabled: true
  host: "0.0.0.0"       # 0.0.0.0 = all interfaces; 127.0.0.1 = local only
  port: 8080
  # Set both to require a login before viewing/editing. Leave blank only on a
  # trusted, isolated control network.
  username: ""
  password: ""
  # Allow forcing devices On/Off from the dashboard (Auto/On/Off buttons).
  # Default false = display-only. Fail-closed: only works when a login is set.
  # Overrides persist in overrides.json; changes are written to audit.log.
  allow_manual_control: false
  # Allow sending arbitrary messages from the MQTT console (MQTT page).
  # Default false = the live feed is read-only. Fail-closed like the above.
  allow_mqtt_publish: false
  # Trusted-LAN escape hatch: allow the two controls above to work WITHOUT a web
  # login. Default false. With this true (and username/password blank) the whole
  # UI is open and anyone who can reach the page can drive MQTT -- like an
  # anonymous broker. Only set this on an isolated/trusted network. (The
  # cross-site request guard still applies, so a remote web page can't drive it.)
  # allow_anonymous_control: false
  # The MQTT console subscribes so the web UI can show a live message feed:
  # mqtt_console_enabled: true            # set false to disable the subscription
  # mqtt_console_topics: ["#"]            # topics to watch (default: everything)
  # mqtt_console_buffer: 500              # max recent messages kept in memory

# --- MQTT broker -----------------------------------------------------------
mqtt:
  host: "localhost"
  port: 1883
  username: ""           # leave blank for anonymous brokers
  password: ""
  client_id: "weather-mqtt-controller"
  qos: 1
  retain: true           # broker keeps the last value for new subscribers
  # Optional: publish a JSON snapshot of all conditions here each cycle (handy
  # for dashboards / SCADA debugging). Leave "" to disable. The snapshot is
  # retained and carries a `generated_at` UTC timestamp, so a subscriber can spot
  # a stale/hung controller (the Last Will only fires on a dropped connection,
  # not a wedged main loop). It is re-asserted on reconnect after a broker restart.
  status_topic: "irrigation/weather/status"
  # Retained online/offline availability topic + MQTT Last Will. The controller
  # publishes "online" on connect and (via the LWT) "offline" if it dies
  # unexpectedly, so subscribers can tell "controller alive" from "controller
  # gone" instead of trusting a stale retained directive forever. "" disables it.
  availability_topic: "weather-mqtt/status"
  # Optional TLS for the broker connection. Omit/disable for plaintext (default).
  # tls:
  #   enabled: true
  #   ca_certs: "/etc/ssl/certs/ca.pem"   # verify the broker against this CA
  #   certfile: ""                        # optional client cert (mutual TLS)
  #   keyfile: ""
  #   insecure: false                     # true skips verification (testing only)

# --- Slack alerts (optional) -----------------------------------------------
# Post to Slack if the MQTT broker stays unreachable past the threshold (and an
# all-clear when it recovers). Needs a bot token (xoxb-...) with chat:write,
# invited to the channel. The token can go here OR -- preferred, to keep secrets
# out of this file -- in the SLACK_BOT_TOKEN environment variable (which wins).
slack:
  enabled: false
  channel: ""                       # "#alerts" or a channel ID like "C0123456"
  bot_token: ""                     # or set SLACK_BOT_TOKEN in the environment
  broker_unreachable_minutes: 60    # alert after the broker is down this long
  stale_weather_minutes: 0          # alert after NWS weather is unusable this long (0 = off)

# --- Remote status page (optional, read-only) ------------------------------
# Push a copy of the status snapshot to an external dashboard each cycle. This
# is OUTBOUND ONLY -- the controller POSTs to your URL; nothing can reach back
# in and there is no remote control. Pair with cloud-status/ingest.php on your
# web host. The token is sent in the X-Status-Token header.
status_push:
  enabled: false
  url: ""        # e.g. https://dashboards.example.com/weather/ingest.php
  token: ""      # shared secret; must match the token in ingest.php

# --- Metric history (optional) ---------------------------------------------
# Record each cycle's numeric metrics to a small SQLite file so the web UI's
# History page can chart trends. Pruned to retention_days. Set enabled: false
# to turn it off (the History page then shows an empty state).
history:
  enabled: true
  file: "history.db"
  retention_days: 14

# --- Rules -----------------------------------------------------------------
# Each rule publishes `on_match` to `topic` when its condition becomes true,
# and `on_clear` when it becomes false again. Publishing happens only on a
# state change (unless always_publish: true).
#
# A rule's `when` is either ONE condition:
#     when: { metric: ..., operator: ..., value: ... }
# or a compound of several, combined with `any` (OR) or `all` (AND). Those
# groups can be NESTED and negated with `not` to any depth:
#     when:
#       all:
#         - not: { metric: temperature, operator: "<", value: 32 }
#         - any:
#             - { metric: is_raining, operator: "==", value: true }
#             - { metric: wind_speed_mph, operator: "between", value: [20, 60] }
#
# Each rule may also set `enabled: false` to leave it idle (not evaluated, no
# publishing -- the broker's last retained value stands).
#
# Optional per-rule gating for driving real loads (pumps/valves/fans):
#   window:     { from: "06:00", to: "20:00", days: [mon,tue,wed,thu,fri] }
#               outside the window the desired state is forced OFF ('to' is
#               exclusive; from > to wraps past midnight; days defaults to all).
#   hysteresis: { min_on: 10m, min_off: 5m, cooldown: 0m }
#               anti-short-cycle timers (accept 30s / 10m / 2h / bare minutes).
#
# Available metrics:
#   is_raining                 precipitating right now (true/false)   [== !=]
#   precip_accum_in            measured rainfall over lookback_hours, inches
#   precipitation_probability  FORECAST chance of precip, 0-100 (%)
#   temperature                current air temp, degF (measured if available)
#   wind_speed_mph             current wind speed, mph
#   humidity                   relative humidity, 0-100 (%)
#   short_forecast             text e.g. "Light Rain"  (operators: contains, equals, in)
#   active_alert               NWS watches/warnings    (operators: any | contains | equals)
#   time_hour / time_minute    local clock, numbers (0-23 / 0-59)
#   time_weekday               mon..sun (local)        (operators: equals, in, contains)
#   time_is_weekend            Sat/Sun (true/false)    [== !=]
#   time_is_daytime            sun up at your lat/long (true/false)  [== !=]
#
# Numeric operators:  <  <=  >  >=  ==  !=  between  in
#   between -> inclusive [low, high] pair;   in -> list of allowed values
# Text operators:  contains  equals  in  regex   (regex is case-insensitive)
#
# Compare two metrics: use value_metric instead of value (number/bool, with
#   < <= > >= == !=), e.g. { metric: tank_level, operator: "<", value_metric: var_setpoint }
#
# History-aware (any metric):
#   operator: changed   -> true the cycle a metric's value changes (no value)
#   for: <duration>      -> condition must hold continuously this long, e.g.
#                           { metric: temperature, operator: ">", value: 85, for: "10m" }
#
# Computed metrics (optional): derive new number metrics from a formula over
# others (+ - * / // % ** and parentheses). Each becomes a usable metric; refs
# must be defined above it. A missing input yields no value (rules hold).
# computed:
#   net_power:  { expr: "power_kw - solar_kw" }
#   temp_delta: { expr: "temperature - var_temp_setpoint" }
#
# Extra actions (optional, per rule): besides on_match/on_clear, fire more things
# on a transition. Use `trigger` (match|clear|both) -- NOT `on` (a YAML boolean).
# Payloads/urls/bodies/text support {{metric}} templating. Best-effort.
#   actions:
#     - { trigger: match, mqtt: { topic: "facility/fan", payload: "RUN {{temperature}}" } }
#     - { trigger: both,  webhook: { url: "https://hooks.example.com/x", method: POST,
#                                    body: '{"temp": {{temperature}}}' } }
#     - { trigger: clear, notify: { text: "cleared at {{temperature}}F" } }
# ---------------------------------------------------------------------------
rules:
  # The main one: don't water if it's raining now OR it has already rained
  # enough in the last 24h. Publishes a retained directive the PLCs subscribe
  # to -- "INHIBIT" = hold the valves closed, "ALLOW" = normal watering.
  - name: irrigation_rain_inhibit
    description: "Hold irrigation when it is raining or has rained >= 0.25 in / 24h"
    when:
      any:
        - metric: is_raining
          operator: "=="
          value: true
        - metric: precip_accum_in
          operator: ">="
          value: 0.25          # inches over lookback_hours; tune to taste
    topic: "irrigation/rain_inhibit"
    on_match: "INHIBIT"
    on_clear: "ALLOW"

  # Optional extra signals you can wire up on the PLC/SCADA side. Delete any
  # you don't need. (Quote payloads -- unquoted ON/OFF/YES/NO become booleans.)
  - name: any_nws_alert
    description: "Generic flag whenever ANY NWS alert is active for our area"
    when:
      metric: active_alert
      operator: "any"
    topic: "facility/weather/nws_alert"
    on_match: "1"
    on_clear: "0"
